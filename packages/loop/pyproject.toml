[project]
name = "tau-loop"
version = "0.1.0"
description = "Judge-driven outer loop — drives any tau agent to completion via genuine LLM judges (no max loops, no deterministic stubs)"
requires-python = ">=3.11"
dependencies = [
    "pi-ai",
    "pi-coding-agent",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tau_loop"]

[tool.uv.sources]
pi-ai = { workspace = true }
pi-coding-agent = { workspace = true }
